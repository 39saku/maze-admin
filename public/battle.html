<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Maze Battle Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/data/maps.js"></script>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4cc9f0;
            padding-bottom: 10px;
        }

        .setup-area {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        #player-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-left: 2px solid #4cc9f0;
            padding-left: 20px;
        }

        .player-chip {
            background: #0f3460;
            border: 1px solid #4cc9f0;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .player-chip.selected {
            background: #f72585;
            border-color: white;
            box-shadow: 0 0 10px #f72585;
        }

        #battle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .maze-container {
            background: #0f3460;
            border: 2px solid #4cc9f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .maze-info {
            font-size: 14px;
            margin-bottom: 5px;
            color: #4cc9f0;
            font-weight: bold;
        }

        button {
            background: #f72585;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <header>
        <h1>MAZE BATTLE MODE</h1>
        <a href="/index.html"><button
                style="background: #6c757d; font-size: 14px; padding: 8px 15px; color: white; border: none; border-radius: 5px; cursor: pointer;">ランキングに戻る</button></a>
    </header>

    <div class="setup-area">
        <div>
            Level:
            <select id="level-select" onchange="refreshPlayerList()" style="font-size: 18px; padding: 5px;">
                <option value="1">Level 1</option>
                <option value="2">Level 2</option>
                <option value="3">Level 3</option>
            </select>
        </div>
        <button onclick="startBattle()">一斉スタート！</button>
        <div id="player-list"></div>
    </div>

    <div id="battle-grid"></div>

    <script>
        const socket = io();
        let allPlayerData = [];
        let selectedNames = new Set();
        let battleInstances = [];

        const AsyncFunction = Object.getPrototypeOf(async function () { }).constructor;

        socket.on('update_leaderboard', (data) => {
            allPlayerData = data;
            refreshPlayerList();
        });

        function refreshPlayerList() {
            const level = parseInt(document.getElementById('level-select').value);
            const listDiv = document.getElementById('player-list');
            listDiv.innerHTML = '';
            const currentLevelData = allPlayerData.filter(d => d.level === level);
            const seen = new Set();
            currentLevelData.reverse().forEach(p => {
                if (!seen.has(p.nickname)) {
                    seen.add(p.nickname);
                    const chip = document.createElement('div');
                    chip.className = `player-chip ${selectedNames.has(p.nickname) ? 'selected' : ''}`;
                    chip.innerText = p.nickname;
                    chip.onclick = () => {
                        if (selectedNames.has(p.nickname)) selectedNames.delete(p.nickname);
                        else selectedNames.add(p.nickname);
                        refreshPlayerList();
                    };
                    listDiv.appendChild(chip);
                }
            });
        }

        async function startBattle() {
            if (selectedNames.size === 0) return alert("人を選んでください");

            battleInstances.forEach(ins => ins.remove());
            battleInstances = [];
            document.getElementById('battle-grid').innerHTML = '';

            const level = parseInt(document.getElementById('level-select').value);
            const mapData = ALL_MAPS.find(m => m.id === level);

            selectedNames.forEach(name => {
                const pData = allPlayerData.find(d => d.nickname === name && d.level === level);
                if (pData) createMazeInstance(pData, mapData);
            });
        }

        function createMazeInstance(playerData, mapData) {
            const container = document.createElement('div');
            container.className = 'maze-container';
            const mazeId = `maze-${playerData.nickname.replace(/\s+/g, '-')}`;
            container.innerHTML = `<div class="maze-info">${playerData.nickname}</div><div id="${mazeId}"></div>`;
            document.getElementById('battle-grid').appendChild(container);

            const s = (p) => {
                let grid = mapData.grid.map(row => [...row]);
                let px = mapData.start.x, py = mapData.start.y;
                let coins = 0, isFinished = false, cellSize = 15;

                p.setup = () => {
                    p.createCanvas(grid[0].length * cellSize, grid.length * cellSize).parent(mazeId);
                    setTimeout(runCode, 500); // 少し待ってから開始
                };

                p.draw = () => {
                    p.background(30);
                    for (let y = 0; y < grid.length; y++) {
                        for (let x = 0; x < grid[y].length; x++) {
                            let cell = grid[y][x];
                            p.noStroke();
                            if (cell === 1) p.fill(60);
                            else if (cell === 2) p.fill(255, 200, 0);
                            else if (cell === 4) p.fill(50, 255, 50);
                            else p.fill(200);
                            p.rect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
                        }
                    }
                    p.fill(0, 200, 255);
                    p.ellipse(px * cellSize + cellSize / 2, py * cellSize + cellSize / 2, cellSize * 0.8);
                };

                async function runCode() {
                    console.log(`${playerData.nickname} のコード実行開始`);

                    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
                    const move = async (dir) => {
                        if (isFinished) return;
                        let dx = 0, dy = 0;
                        if (dir === "up") dy = -1; else if (dir === "down") dy = 1;
                        else if (dir === "left") dx = -1; else if (dir === "right") dx = 1;

                        if (grid[py + dy] && grid[py + dy][px + dx] !== 1) {
                            px += dx; py += dy;
                            if (grid[py][px] === 2) { coins++; grid[py][px] = 0; }
                            if (grid[py][px] === 4 && coins === mapData.coins) isFinished = true;
                        }
                        await sleep(200); // 移動速度
                    };
                    const look = (dir) => {
                        let dx = 0, dy = 0;
                        if (dir === "up") dy = -1; else if (dir === "down") dy = 1;
                        else if (dir === "left") dx = -1; else if (dir === "right") dx = 1;
                        return grid[py + dy] ? grid[py + dy][px + dx] : 1;
                    };

                    try {
                        // 関数の中身を抽出
                        const code = playerData.code;
                        const body = code.slice(code.indexOf('{') + 1, code.lastIndexOf('}'));

                        // AsyncFunctionを使って非同期関数として実行
                        const asyncFunc = new AsyncFunction('move', 'look', 'sleep', body);
                        await asyncFunc(move, look, sleep);

                        console.log(`${playerData.nickname} のコードが終了しました`);
                    } catch (e) {
                        console.error(`${playerData.nickname} の実行エラー:`, e);
                    }
                }
            };
            battleInstances.push(new p5(s));
        }
    </script>
</body>

</html>
